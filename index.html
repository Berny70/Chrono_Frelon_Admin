<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#1a2e1a">
  <title>Chrono-Frelon Admin</title>
  <link rel="manifest" href="manifest.json">
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    :root {
      --forest: #1a2e1a; --forest-mid: #2d4a2d; --forest-light: #4a7c4a;
      --amber: #d4820a; --amber-light: #f0a832;
      --cream: #f5f0e8; --cream-dark: #e8e0d0;
      --danger: #c0392b; --text: #1a1a18; --text-muted: #6b6b5a;
      --border: rgba(26,46,26,0.15); --radius: 12px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'DM Sans', sans-serif; background: var(--cream); color: var(--text); min-height: 100vh; font-size: 15px; }
    h1,h2,h3 { font-family: 'DM Serif Display', serif; font-weight: 400; }
    .screen { display: none; min-height: 100vh; }
    .screen.active { display: flex; flex-direction: column; }

    /* AUTH */
    #screen-auth { background: var(--forest); align-items: center; justify-content: center; padding: 24px; }
    .auth-card { background: var(--cream); border-radius: 20px; padding: 40px 36px; width: 100%; max-width: 420px; box-shadow: 0 20px 60px rgba(0,0,0,0.3); }
    .auth-logo { display: flex; align-items: center; gap: 12px; margin-bottom: 32px; }
    .auth-logo-text h1 { font-size: 22px; color: var(--forest); line-height: 1; }
    .auth-logo-text span { font-size: 11px; color: var(--text-muted); letter-spacing: 0.08em; text-transform: uppercase; }
    .auth-tabs { display: flex; background: var(--cream-dark); border-radius: 8px; padding: 3px; margin-bottom: 28px; }
    .auth-tab { flex: 1; padding: 8px; border: none; background: transparent; border-radius: 6px; font-family: 'DM Sans', sans-serif; font-size: 14px; color: var(--text-muted); cursor: pointer; transition: all 0.2s; }
    .auth-tab.active { background: var(--forest); color: #fff; font-weight: 500; }
    .form-group { margin-bottom: 16px; }
    .form-group label { display: block; font-size: 11px; font-weight: 500; color: var(--text-muted); margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.06em; }
    .form-group input, .form-group select { width: 100%; padding: 11px 14px; border: 1.5px solid var(--border); border-radius: 8px; font-family: 'DM Sans', sans-serif; font-size: 15px; background: #fff; color: var(--text); outline: none; transition: border-color 0.2s; }
    .form-group input:focus { border-color: var(--forest-light); }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .btn-primary { width: 100%; padding: 13px; background: var(--forest); color: #fff; border: none; border-radius: 8px; font-family: 'DM Sans', sans-serif; font-size: 15px; font-weight: 500; cursor: pointer; margin-top: 8px; transition: background 0.2s; }
    .btn-primary:hover { background: var(--forest-mid); }
    .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }
    .auth-message { margin-top: 16px; padding: 12px 14px; border-radius: 8px; font-size: 14px; display: none; }
    .auth-message.success { background: #e8f5e9; color: #2e7d32; border: 1px solid #a5d6a7; display: block; }
    .auth-message.error { background: #fdecea; color: var(--danger); border: 1px solid #f5c6c2; display: block; }

    /* PENDING */
    #screen-pending { background: var(--forest); align-items: center; justify-content: center; padding: 24px; }
    .pending-card { background: var(--cream); border-radius: 20px; padding: 48px 36px; max-width: 400px; text-align: center; }
    .pending-icon { width: 64px; height: 64px; background: #fef3cd; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 24px; font-size: 28px; }
    .pending-card h2 { font-size: 24px; margin-bottom: 12px; color: var(--forest); }
    .pending-card p { color: var(--text-muted); line-height: 1.6; font-size: 14px; }
    .btn-secondary { margin-top: 24px; padding: 10px 24px; background: transparent; border: 1.5px solid var(--forest); border-radius: 8px; font-family: 'DM Sans', sans-serif; font-size: 14px; color: var(--forest); cursor: pointer; }

    /* DASHBOARD */
    #screen-dashboard { background: var(--cream); }
    .topbar { background: var(--forest); color: #fff; padding: 0 20px; height: 60px; display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; }
    .topbar-left { display: flex; align-items: center; gap: 12px; }
    .topbar-title { font-family: 'DM Serif Display', serif; font-size: 18px; }
    .topbar-sub { font-size: 12px; opacity: 0.65; }
    .topbar-right { display: flex; align-items: center; gap: 8px; }
    .lang-pill { display: flex; background: rgba(255,255,255,0.1); border-radius: 6px; overflow: hidden; }
    .lang-btn { padding: 5px 10px; border: none; background: transparent; color: rgba(255,255,255,0.6); font-size: 12px; cursor: pointer; transition: all 0.2s; font-family: 'DM Sans', sans-serif; }
    .lang-btn.active { background: rgba(255,255,255,0.2); color: #fff; font-weight: 500; }
    .btn-icon { width: 34px; height: 34px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.2); background: transparent; color: #fff; display: flex; align-items: center; justify-content: center; cursor: pointer; }
    .btn-icon:hover { background: rgba(255,255,255,0.1); }
    .nav-tabs { display: flex; background: var(--forest-mid); padding: 0 20px; flex-shrink: 0; }
    .nav-tab { padding: 10px 18px; border: none; background: transparent; color: rgba(255,255,255,0.55); font-family: 'DM Sans', sans-serif; font-size: 13px; font-weight: 500; cursor: pointer; border-bottom: 2px solid transparent; transition: all 0.2s; }
    .nav-tab.active { color: #fff; border-bottom-color: var(--amber-light); }
    .dashboard-content { flex: 1; overflow: hidden; display: flex; flex-direction: column; }

    /* MAP */
    #tab-map { flex: 1; display: none; flex-direction: column; }
    #tab-map.active { display: flex; }
    #map { flex: 1; min-height: 300px; }
    .map-stats { background: #fff; padding: 12px 20px; display: flex; gap: 28px; border-top: 1px solid var(--border); flex-shrink: 0; flex-wrap: wrap; }
    .stat-value { font-family: 'DM Serif Display', serif; font-size: 24px; color: var(--forest); line-height: 1; }
    .stat-label { font-size: 11px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.05em; margin-top: 2px; }

    /* TABS */
    #tab-signals, #tab-users { flex: 1; display: none; overflow-y: auto; }
    #tab-signals.active, #tab-users.active { display: block; }
    .tab-header { padding: 14px 20px; border-bottom: 1px solid var(--border); background: #fff; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 10; }
    .tab-header h3 { font-size: 16px; }
    .search-input { padding: 8px 12px; border: 1.5px solid var(--border); border-radius: 8px; font-family: 'DM Sans', sans-serif; font-size: 14px; outline: none; width: 180px; }
    .search-input:focus { border-color: var(--forest-light); }
    .list-container { padding: 12px 20px; display: flex; flex-direction: column; gap: 8px; }

    /* CARDS */
    .signal-card, .user-card { background: #fff; border: 1px solid var(--border); border-radius: var(--radius); padding: 14px 16px; display: flex; align-items: center; gap: 12px; }
    .signal-card.blocked-user { opacity: 0.55; border-left: 3px solid var(--danger); }
    .user-card.blocked { opacity: 0.6; background: #fdecea; border-color: #f5c6c2; }
    .signal-info, .user-info { flex: 1; min-width: 0; }
    .signal-date, .user-phone { font-size: 13px; font-weight: 500; color: var(--forest); }
    .user-phone { font-family: monospace; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .signal-meta, .user-meta { font-size: 12px; color: var(--text-muted); margin-top: 3px; font-family: monospace; }
    .badge { padding: 3px 8px; border-radius: 20px; font-size: 11px; font-weight: 500; white-space: nowrap; }
    .badge-blocked { background: #fdecea; color: var(--danger); border: 1px solid #f5c6c2; }
    .badge-active { background: #e8f5e9; color: #2e7d32; border: 1px solid #a5d6a7; }
    .btn-block { padding: 6px 12px; border: 1.5px solid var(--danger); border-radius: 6px; background: transparent; color: var(--danger); font-size: 12px; cursor: pointer; white-space: nowrap; transition: all 0.2s; font-family: 'DM Sans', sans-serif; }
    .btn-block:hover { background: var(--danger); color: #fff; }
    .btn-unblock { padding: 6px 12px; border: 1.5px solid #2e7d32; border-radius: 6px; background: transparent; color: #2e7d32; font-size: 12px; cursor: pointer; white-space: nowrap; font-family: 'DM Sans', sans-serif; }
    .btn-delete { padding: 6px 12px; border: 1.5px solid #aaa; border-radius: 6px; background: transparent; color: #777; font-size: 12px; cursor: pointer; transition: all 0.2s; font-family: 'DM Sans', sans-serif; }
    .btn-delete:hover { border-color: var(--danger); color: var(--danger); }

    /* MODAL */
    .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 1000; align-items: center; justify-content: center; padding: 24px; }
    .modal-overlay.active { display: flex; }
    .modal { background: var(--cream); border-radius: 16px; padding: 28px; max-width: 360px; width: 100%; }
    .modal h3 { font-size: 20px; margin-bottom: 10px; color: var(--forest); }
    .modal p { color: var(--text-muted); font-size: 14px; line-height: 1.5; margin-bottom: 20px; }
    .modal-actions { display: flex; gap: 10px; justify-content: flex-end; }
    .btn-cancel { padding: 10px 18px; border: 1.5px solid var(--border); border-radius: 8px; background: transparent; font-family: 'DM Sans', sans-serif; font-size: 14px; cursor: pointer; }
    .btn-danger { padding: 10px 18px; border: none; border-radius: 8px; background: var(--danger); color: #fff; font-family: 'DM Sans', sans-serif; font-size: 14px; font-weight: 500; cursor: pointer; }

    /* TOAST */
    .toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(80px); background: var(--forest); color: #fff; padding: 12px 20px; border-radius: 8px; font-size: 14px; z-index: 2000; transition: transform 0.3s; white-space: nowrap; }
    .toast.show { transform: translateX(-50%) translateY(0); }

    /* MISC */
    .spinner { width: 20px; height: 20px; border: 2px solid var(--border); border-top-color: var(--forest); border-radius: 50%; animation: spin 0.8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading { display: flex; align-items: center; justify-content: center; padding: 40px; color: var(--text-muted); gap: 10px; }
    .empty { text-align: center; padding: 48px 24px; color: var(--text-muted); }
    .empty-icon { font-size: 36px; margin-bottom: 12px; }
    @media (max-width: 480px) { .auth-card { padding: 28px 20px; } .form-row { grid-template-columns: 1fr; } }
  </style>
</head>
<body>

<!-- AUTH -->
<div id="screen-auth" class="screen active">
  <div class="auth-card">
    <div class="auth-logo">
      <svg width="44" height="44" viewBox="0 0 44 44">
        <circle cx="22" cy="22" r="22" fill="#1a2e1a"/>
        <ellipse cx="22" cy="22" rx="9" ry="5.5" fill="#d4820a" transform="rotate(-20 22 22)"/>
        <circle cx="22" cy="22" r="4" fill="#f0a832"/>
        <path d="M19 14 Q22 10 25 14" stroke="#f0a832" stroke-width="1.5" fill="none" stroke-linecap="round"/>
        <path d="M17 30 Q22 34 27 30" stroke="#f0a832" stroke-width="1.5" fill="none" stroke-linecap="round"/>
      </svg>
      <div class="auth-logo-text">
        <h1>Chrono-Frelon</h1>
        <span data-i18n="admin_portal">Portail Administrateur</span>
      </div>
    </div>
    <div class="lang-pill" style="margin-bottom:20px; display:inline-flex">
      <button class="lang-btn active" onclick="setLang('fr')">FR</button>
      <button class="lang-btn" onclick="setLang('de')">DE</button>
    </div>
    <div class="auth-tabs">
      <button class="auth-tab active" onclick="switchAuthTab('login')" data-i18n="tab_login">Connexion</button>
      <button class="auth-tab" onclick="switchAuthTab('register')" data-i18n="tab_register">Inscription</button>
    </div>

    <div id="form-login">
      <div class="form-group">
        <label data-i18n="lbl_email">Email</label>
        <input type="email" id="login-email" placeholder="admin@commune.fr">
      </div>
      <button class="btn-primary" id="btn-magic" onclick="sendMagicLink()">
        <span data-i18n="btn_send_link">Envoyer le lien magique</span>
      </button>
      <div class="auth-message" id="login-msg"></div>
    </div>

    <div id="form-register" style="display:none">
      <div class="form-row">
        <div class="form-group">
          <label data-i18n="lbl_prenom">Prénom</label>
          <input type="text" id="reg-prenom" placeholder="Marie">
        </div>
        <div class="form-group">
          <label data-i18n="lbl_nom">Nom</label>
          <input type="text" id="reg-nom" placeholder="Dupont">
        </div>
      </div>
      <div class="form-group">
        <label data-i18n="lbl_email">Email</label>
        <input type="email" id="reg-email" placeholder="admin@commune.fr">
      </div>
      <div class="form-row">
        <div class="form-group">
          <label data-i18n="lbl_dept">Département</label>
          <input type="text" id="reg-dept" placeholder="Doubs (25)">
        </div>
        <div class="form-group">
          <label data-i18n="lbl_canton">Canton</label>
          <input type="text" id="reg-canton" placeholder="Baume-les-Dames">
        </div>
      </div>
      <button class="btn-primary" id="btn-register" onclick="registerAdmin()">
        <span data-i18n="btn_request">Demander l'accès</span>
      </button>
      <div class="auth-message" id="register-msg"></div>
    </div>
  </div>
</div>

<!-- PENDING -->
<div id="screen-pending" class="screen">
  <div class="pending-card">
    <div class="pending-icon">⏳</div>
    <h2 data-i18n="pending_title">Compte en attente</h2>
    <p data-i18n="pending_text">Votre demande d'accès a été enregistrée. Vous serez notifié par email après validation par le super-administrateur.</p>
    <button class="btn-secondary" onclick="signOut()" data-i18n="btn_logout">Se déconnecter</button>
  </div>
</div>

<!-- DASHBOARD -->
<div id="screen-dashboard" class="screen">
  <div class="topbar">
    <div class="topbar-left">
      <svg width="28" height="28" viewBox="0 0 28 28">
        <circle cx="14" cy="14" r="14" fill="rgba(255,255,255,0.15)"/>
        <ellipse cx="14" cy="14" rx="6" ry="3.5" fill="#f0a832" transform="rotate(-20 14 14)"/>
        <circle cx="14" cy="14" r="2.5" fill="#fff"/>
      </svg>
      <div>
        <div class="topbar-title">Chrono-Frelon Admin</div>
        <div class="topbar-sub" id="topbar-canton">—</div>
        <div style="font-size:10px;opacity:0.4;letter-spacing:0.06em" id="topbar-version"></div>
      </div>
    </div>
    <div class="topbar-right">
      <div class="lang-pill">
        <button class="lang-btn active" onclick="setLang('fr')">FR</button>
        <button class="lang-btn" onclick="setLang('de')">DE</button>
      </div>
      <button class="btn-icon" onclick="signOut()" title="Déconnexion">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4M16 17l5-5-5-5M21 12H9"/>
        </svg>
      </button>
    </div>
  </div>

  <div class="nav-tabs">
    <button class="nav-tab active" onclick="switchTab('map', this)" data-i18n="tab_map">Carte</button>
    <button class="nav-tab" onclick="switchTab('signals', this)" data-i18n="tab_signals">Signalements</button>
    <button class="nav-tab" onclick="switchTab('users', this)" data-i18n="tab_users">Utilisateurs</button>
  </div>

  <div class="dashboard-content">
    <div id="tab-map" class="active">
      <div id="map"></div>
      <div class="map-stats">
        <div><div class="stat-value" id="stat-total">—</div><div class="stat-label" data-i18n="lbl_total">Signalements</div></div>
        <div><div class="stat-value" id="stat-today">—</div><div class="stat-label" data-i18n="lbl_today">Aujourd'hui</div></div>
        <div><div class="stat-value" id="stat-users">—</div><div class="stat-label" data-i18n="lbl_users">Utilisateurs</div></div>
        <div><div class="stat-value" id="stat-blocked">—</div><div class="stat-label" data-i18n="lbl_blocked">Bloqués</div></div>
      </div>
    </div>

    <div id="tab-signals">
      <div class="tab-header">
        <h3 data-i18n="tab_signals">Signalements</h3>
        <input class="search-input" type="text" id="search-signals" placeholder="Rechercher…" oninput="filterSignals()">
      </div>
      <div class="list-container" id="signals-list">
        <div class="loading"><div class="spinner"></div></div>
      </div>
    </div>

    <div id="tab-users">
      <div class="tab-header">
        <h3 data-i18n="tab_users">Utilisateurs</h3>
        <input class="search-input" type="text" id="search-users" placeholder="Rechercher…" oninput="filterUsers()">
      </div>
      <div class="list-container" id="users-list">
        <div class="loading"><div class="spinner"></div></div>
      </div>
    </div>
  </div>
</div>

<!-- MODAL -->
<div class="modal-overlay" id="modal">
  <div class="modal">
    <h3 id="modal-title"></h3>
    <p id="modal-text"></p>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal()" data-i18n="btn_cancel">Annuler</button>
      <button class="btn-danger" id="modal-ok"></button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const SUPABASE_URL = 'https://pqozgsgytzntrqscevrt.supabase.co';
const SUPABASE_ANON_KEY = 'REMPLACE_PAR_TA_CLE_ANON_SUPABASE';
const APP_VERSION = '1.0.0';
const APP_DATE = '2026-04';
const { createClient } = supabase;
const sb = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

let currentUser = null, currentProfile = null;
let allSignals = [], allUsers = [];
let leafletMap = null, lang = 'fr';

const I18N = {
  fr: {
    admin_portal:'Portail Administrateur', tab_login:'Connexion', tab_register:'Inscription',
    lbl_email:'Email', lbl_prenom:'Prénom', lbl_nom:'Nom', lbl_dept:'Département', lbl_canton:'Canton',
    btn_send_link:'Envoyer le lien magique', btn_request:"Demander l'accès", btn_logout:'Se déconnecter',
    pending_title:'Compte en attente',
    pending_text:"Votre demande d'accès a été enregistrée. Vous serez notifié par email après validation par le super-administrateur.",
    tab_map:'Carte', tab_signals:'Signalements', tab_users:'Utilisateurs',
    lbl_total:'Signalements', lbl_today:"Aujourd'hui", lbl_users:'Utilisateurs', lbl_blocked:'Bloqués',
    btn_cancel:'Annuler', btn_block:'Bloquer', btn_unblock:'Débloquer', btn_delete:'Supprimer',
    badge_blocked:'Bloqué', badge_active:'Actif', lbl_signals:'signalements',
    empty_signals:'Aucun signalement dans ce canton.', empty_users:'Aucun utilisateur dans ce canton.',
    msg_link_sent:'Lien magique envoyé ! Vérifiez votre email.',
    msg_registered:'Inscription enregistrée. En attente de validation.',
    msg_blocked:'Utilisateur bloqué.', msg_unblocked:'Utilisateur débloqué.', msg_deleted:'Signalement supprimé.',
    msg_fill:'Veuillez remplir tous les champs.',
    modal_block_title:'Bloquer cet utilisateur', modal_block_text:'Cet utilisateur ne pourra plus soumettre de signalements.',
    modal_unblock_title:'Débloquer cet utilisateur', modal_unblock_text:'Cet utilisateur pourra à nouveau soumettre des signalements.',
    modal_delete_title:'Supprimer ce signalement', modal_delete_text:'Cette action est irréversible.',
  },
  de: {
    admin_portal:'Administrationsportal', tab_login:'Anmelden', tab_register:'Registrieren',
    lbl_email:'E-Mail', lbl_prenom:'Vorname', lbl_nom:'Nachname', lbl_dept:'Département', lbl_canton:'Kanton',
    btn_send_link:'Magic-Link senden', btn_request:'Zugang beantragen', btn_logout:'Abmelden',
    pending_title:'Konto ausstehend',
    pending_text:'Ihre Administratoranfrage wurde registriert. Sie werden per E-Mail benachrichtigt, sobald der Super-Administrator bestätigt.',
    tab_map:'Karte', tab_signals:'Meldungen', tab_users:'Benutzer',
    lbl_total:'Meldungen', lbl_today:'Heute', lbl_users:'Benutzer', lbl_blocked:'Gesperrt',
    btn_cancel:'Abbrechen', btn_block:'Sperren', btn_unblock:'Entsperren', btn_delete:'Löschen',
    badge_blocked:'Gesperrt', badge_active:'Aktiv', lbl_signals:'Meldungen',
    empty_signals:'Keine Meldungen in diesem Kanton.', empty_users:'Keine Benutzer in diesem Kanton.',
    msg_link_sent:'Magic-Link gesendet! Überprüfen Sie Ihre E-Mail.',
    msg_registered:'Registrierung gespeichert. Warte auf Bestätigung.',
    msg_blocked:'Benutzer gesperrt.', msg_unblocked:'Benutzer entsperrt.', msg_deleted:'Meldung gelöscht.',
    msg_fill:'Bitte füllen Sie alle Felder aus.',
    modal_block_title:'Benutzer sperren', modal_block_text:'Dieser Benutzer kann keine Meldungen mehr einreichen.',
    modal_unblock_title:'Benutzer entsperren', modal_unblock_text:'Dieser Benutzer kann wieder Meldungen einreichen.',
    modal_delete_title:'Meldung löschen', modal_delete_text:'Diese Aktion ist unwiderruflich.',
  }
};

const t = k => I18N[lang][k] || k;

function setLang(l) {
  lang = l;
  document.querySelectorAll('.lang-btn').forEach(b => b.classList.toggle('active', b.textContent === l.toUpperCase()));
  document.querySelectorAll('[data-i18n]').forEach(el => { const v = I18N[lang][el.dataset.i18n]; if(v) el.textContent = v; });
  if(allSignals.length) renderSignals(allSignals);
  if(allUsers.length) renderUsers(allUsers);
}

function showScreen(n) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('screen-' + n).classList.add('active');
}

function switchAuthTab(tab) {
  document.querySelectorAll('.auth-tab').forEach((b,i) => b.classList.toggle('active', (i===0&&tab==='login')||(i===1&&tab==='register')));
  document.getElementById('form-login').style.display = tab==='login' ? 'block' : 'none';
  document.getElementById('form-register').style.display = tab==='register' ? 'block' : 'none';
}

function switchTab(name, btn) {
  document.querySelectorAll('.nav-tab').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('[id^="tab-"]').forEach(t => t.classList.remove('active'));
  if(btn) btn.classList.add('active');
  document.getElementById('tab-' + name).classList.add('active');
  if(name==='map' && leafletMap) setTimeout(() => leafletMap.invalidateSize(), 50);
}

function showToast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 3000);
}

function showModal(title, text, label, cb) {
  document.getElementById('modal-title').textContent = title;
  document.getElementById('modal-text').textContent = text;
  const btn = document.getElementById('modal-ok');
  btn.textContent = label;
  btn.onclick = () => { closeModal(); cb(); };
  document.getElementById('modal').classList.add('active');
}

function closeModal() { document.getElementById('modal').classList.remove('active'); }

async function sendMagicLink() {
  const email = document.getElementById('login-email').value.trim();
  if(!email) return;
  document.getElementById('btn-magic').disabled = true;
  const { error } = await sb.auth.signInWithOtp({ email, options: { emailRedirectTo: window.location.origin }});
  document.getElementById('btn-magic').disabled = false;
  const msg = document.getElementById('login-msg');
  msg.className = 'auth-message ' + (error ? 'error' : 'success');
  msg.textContent = error ? error.message : t('msg_link_sent');
}

async function registerAdmin() {
  const prenom = document.getElementById('reg-prenom').value.trim();
  const nom = document.getElementById('reg-nom').value.trim();
  const email = document.getElementById('reg-email').value.trim();
  const dept = document.getElementById('reg-dept').value.trim();
  const canton = document.getElementById('reg-canton').value.trim();
  const msg = document.getElementById('register-msg');
  if(!prenom||!nom||!email||!dept||!canton) {
    msg.className='auth-message error'; msg.textContent=t('msg_fill'); return;
  }
  document.getElementById('btn-register').disabled = true;
  const { error } = await sb.auth.signInWithOtp({ email, options: { emailRedirectTo: window.location.origin }});
  document.getElementById('btn-register').disabled = false;
  if(error) { msg.className='auth-message error'; msg.textContent=error.message; return; }
  localStorage.setItem('pending_profile', JSON.stringify({prenom,nom,email,departement:dept,canton}));
  msg.className='auth-message success'; msg.textContent=t('msg_registered');
}

async function checkPendingProfile(userId, email) {
  const raw = localStorage.getItem('pending_profile');
  if(!raw) return;
  const p = JSON.parse(raw);
  if(p.email !== email) return;
  const { data } = await sb.from('admin_profiles').select('id').eq('id',userId).maybeSingle();
  if(!data) await sb.from('admin_profiles').insert({id:userId, email:p.email, nom:p.nom, prenom:p.prenom, canton:p.canton, departement:p.departement, role:'pending'});
  localStorage.removeItem('pending_profile');
}

async function signOut() {
  await sb.auth.signOut();
  currentUser = currentProfile = null;
  showScreen('auth');
}

async function loadSignals() {
  const { data } = await sb.from('chrono_frelon_geo').select('*').order('created_at',{ascending:false}).limit(500);
  allSignals = data || [];
  renderSignals(allSignals);
  updateStats();
}

async function loadUsers() {
  const phones = [...new Set(allSignals.map(s=>s.phone_id).filter(Boolean))];
  const { data: blocked } = await sb.from('blocked_phones').select('phone_id');
  const blockedSet = new Set((blocked||[]).map(b=>b.phone_id));
  allUsers = phones.map(phone => ({
    phone_id: phone,
    count: allSignals.filter(s=>s.phone_id===phone).length,
    last: allSignals.find(s=>s.phone_id===phone)?.created_at,
    blocked: blockedSet.has(phone)
  }));
  renderUsers(allUsers);
  updateStats();
}

function updateStats() {
  const today = new Date().toDateString();
  document.getElementById('stat-total').textContent = allSignals.length;
  document.getElementById('stat-today').textContent = allSignals.filter(s=>new Date(s.created_at).toDateString()===today).length;
  document.getElementById('stat-users').textContent = allUsers.length;
  document.getElementById('stat-blocked').textContent = allUsers.filter(u=>u.blocked).length;
}

function renderSignals(signals) {
  const blockedPhones = new Set(allUsers.filter(u=>u.blocked).map(u=>u.phone_id));
  const el = document.getElementById('signals-list');
  if(!signals.length) { el.innerHTML=`<div class="empty"><div class="empty-icon">📍</div>${t('empty_signals')}</div>`; return; }
  const loc = lang==='fr' ? 'fr-FR' : 'de-DE';
  el.innerHTML = signals.map(s => {
    const isBlocked = blockedPhones.has(s.phone_id);
    return `<div class="signal-card ${isBlocked?'blocked-user':''}">
      <div class="signal-info">
        <div class="signal-date">${new Date(s.created_at).toLocaleString(loc)}</div>
        <div class="signal-meta">${(s.lat||0).toFixed(5)}, ${(s.lon||0).toFixed(5)} · ${s.distance||0}m · ${s.direction||0}°</div>
        <div class="signal-meta" style="font-size:11px;margin-top:3px">${s.phone_id||'—'}</div>
      </div>
      <button class="btn-delete" onclick="confirmDelete(${s.id})">${t('btn_delete')}</button>
    </div>`;
  }).join('');
}

function renderUsers(users) {
  const el = document.getElementById('users-list');
  if(!users.length) { el.innerHTML=`<div class="empty"><div class="empty-icon">👤</div>${t('empty_users')}</div>`; return; }
  const loc = lang==='fr' ? 'fr-FR' : 'de-DE';
  el.innerHTML = users.map(u => `
    <div class="user-card ${u.blocked?'blocked':''}">
      <div class="user-info">
        <div class="user-phone">${u.phone_id}</div>
        <div class="user-meta" style="font-family:sans-serif">${u.count} ${t('lbl_signals')} · ${new Date(u.last).toLocaleDateString(loc)}</div>
      </div>
      <span class="badge ${u.blocked?'badge-blocked':'badge-active'}">${u.blocked?t('badge_blocked'):t('badge_active')}</span>
      ${u.blocked
        ? `<button class="btn-unblock" onclick="confirmUnblock('${u.phone_id}')">${t('btn_unblock')}</button>`
        : `<button class="btn-block" onclick="confirmBlock('${u.phone_id}')">${t('btn_block')}</button>`}
    </div>`).join('');
}

function filterSignals() {
  const q = document.getElementById('search-signals').value.toLowerCase();
  renderSignals(allSignals.filter(s=>(s.phone_id||'').toLowerCase().includes(q)));
}

function filterUsers() {
  const q = document.getElementById('search-users').value.toLowerCase();
  renderUsers(allUsers.filter(u=>u.phone_id.toLowerCase().includes(q)));
}

function confirmDelete(id) {
  showModal(t('modal_delete_title'), t('modal_delete_text'), t('btn_delete'), async () => {
    await sb.from('chrono_frelon_geo').delete().eq('id',id);
    showToast(t('msg_deleted'));
    await loadSignals(); initMap();
  });
}

function confirmBlock(phone_id) {
  showModal(t('modal_block_title'), t('modal_block_text'), t('btn_block'), async () => {
    await sb.from('blocked_phones').upsert({phone_id, blocked_by: currentUser.id});
    showToast(t('msg_blocked'));
    await loadUsers(); renderSignals(allSignals);
  });
}

function confirmUnblock(phone_id) {
  showModal(t('modal_unblock_title'), t('modal_unblock_text'), t('btn_unblock'), async () => {
    await sb.from('blocked_phones').delete().eq('phone_id',phone_id);
    showToast(t('msg_unblocked'));
    await loadUsers(); renderSignals(allSignals);
  });
}

function initMap() {
  const pts = allSignals.filter(s=>s.lat&&s.lon);
  if(!pts.length) return;
  if(!leafletMap) {
    leafletMap = L.map('map').setView([pts[0].lat, pts[0].lon], 10);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {attribution:'© OpenStreetMap'}).addTo(leafletMap);
  } else {
    leafletMap.eachLayer(l => { if(l instanceof L.CircleMarker) leafletMap.removeLayer(l); });
  }
  const blockedPhones = new Set(allUsers.filter(u=>u.blocked).map(u=>u.phone_id));
  pts.forEach(s => {
    const bl = blockedPhones.has(s.phone_id);
    L.circleMarker([s.lat, s.lon], {radius:6, fillColor: bl?'#c0392b':'#2d4a2d', color:'#fff', weight:1.5, fillOpacity:0.85})
      .bindPopup(`<b>${new Date(s.created_at).toLocaleString()}</b><br>${s.distance}m · ${s.direction}°<br><small>${s.phone_id}</small>${bl?'<br><span style="color:red">'+t('badge_blocked')+'</span>':''}`)
      .addTo(leafletMap);
  });
  leafletMap.fitBounds(L.latLngBounds(pts.map(s=>[s.lat,s.lon])), {padding:[20,20]});
}

sb.auth.onAuthStateChange(async (event, session) => {
  if(session?.user) {
    currentUser = session.user;
    await checkPendingProfile(session.user.id, session.user.email);
    const { data } = await sb.from('admin_profiles').select('*').eq('id', session.user.id).maybeSingle();
    currentProfile = data;
    if(!currentProfile || currentProfile.role==='pending') {
      showScreen('pending');
    } else if(currentProfile.role==='blocked') {
      await sb.auth.signOut(); showScreen('auth');
    } else {
      document.getElementById('topbar-canton').textContent = currentProfile.canton + ' · ' + currentProfile.departement;
      document.getElementById('topbar-version').textContent = 'v' + APP_VERSION;
      showScreen('dashboard');
      await loadSignals();
      await loadUsers();
      initMap();
    }
  } else {
    showScreen('auth');
  }
});

if('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js').catch(()=>{});
</script>
</body>
</html>
