<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <script>
    // Récupérer le hash avec le token et rediriger vers la bonne page
    const hash = window.location.hash;
    if (hash && hash.includes('access_token')) {
      window.location.href = 'https://berny70.github.io/Chrono_Frelon_Admin/' + hash;
    } else {
      window.location.href = 'https://berny70.github.io/Chrono_Frelon_Admin/';
    }
  </script>
</head>
<body>Redirection...</body>
</html>
